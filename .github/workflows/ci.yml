name: CI

on:
  push:
  pull_request:

jobs:
  validate-and-grade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate context pack
        run: python scripts/validate_pack.py

      - name: Validate case files
        run: python scripts/validate_cases.py

      - name: Offline grading sanity check
        run: python scripts/check_grading_fixture.py
